<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 终极贪吃蛇游戏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Orbitron', Arial, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 1;
            max-width: 90vw;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .game-header h1 {
            font-size: 2.8em;
            font-weight: 900;
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            from { filter: hue-rotate(0deg); }
            to { filter: hue-rotate(10deg); }
        }
        
        .game-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            background: linear-gradient(145deg, #e6e9f0 0%, #eef1f5 100%);
            padding: 20px;
            border-radius: 15px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .info-value {
            font-size: 28px;
            font-weight: 900;
            color: #333;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .game-board {
            position: relative;
            margin: 20px 0;
        }
        
        canvas {
            border: 4px solid #333;
            background-color: #000;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            display: block;
        }
        
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .game-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .overlay-content {
            background: linear-gradient(145deg, #ffffff 0%, #f5f7fa 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        
        .game-overlay.active .overlay-content {
            transform: scale(1);
        }
        
        .overlay-content h2 {
            font-size: 2.5em;
            color: #ff4757;
            margin-bottom: 20px;
            font-weight: 900;
        }
        
        .overlay-content p {
            font-size: 1.2em;
            color: #333;
            margin: 10px 0;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-family: 'Orbitron', Arial, sans-serif;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .btn-primary {
            background: linear-gradient(145deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        
        .btn-secondary {
            background: linear-gradient(145deg, #2196F3 0%, #1976D2 100%);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(145deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }
        
        .instructions {
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(145deg, #e3f2fd 0%, #bbdefb 100%);
            border-radius: 15px;
            text-align: center;
            font-size: 14px;
            color: #1976d2;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
        }
        
        .instructions h3 {
            margin-bottom: 10px;
            color: #0d47a1;
            font-weight: 700;
        }
        
        .instructions p {
            margin: 5px 0;
            line-height: 1.4;
        }
        
        .mobile-controls {
            display: none;
            margin-top: 20px;
            text-align: center;
        }
        
        .mobile-controls h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
        }
        
        .d-pad-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #4CAF50 0%, #45a049 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }
        
        .d-pad-btn:active {
            transform: scale(0.95);
        }
        
        .d-pad-btn.up { grid-column: 2; grid-row: 1; }
        .d-pad-btn.left { grid-column: 1; grid-row: 2; }
        .d-pad-btn.right { grid-column: 3; grid-row: 2; }
        .d-pad-btn.down { grid-column: 2; grid-row: 3; }
        
        @media (max-width: 768px) {
            .game-header h1 {
                font-size: 2em;
            }
            
            .game-info {
                grid-template-columns: repeat(2, 1fr);
            }
            
            canvas {
                max-width: 100%;
                height: auto;
            }
            
            .mobile-controls {
                display: block;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 200px;
            }
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #4CAF50;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 2s ease-out forwards;
        }
        
        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: scale(0) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scale(1) translateY(-50px);
            }
        }
        
        .achievement {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(145deg, #ffd700 0%, #ffed4a 100%);
            padding: 20px 40px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.5em;
            color: #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: achievementPop 2s ease-out forwards;
        }
        
        @keyframes achievementPop {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        .stats-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .stats-panel h4 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        .stats-panel p {
            margin: 5px 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="stats-panel">
        <h4>🎮 游戏统计</h4>
        <p>最高得分: <span id="highScore">0</span></p>
        <p>游戏次数: <span id="gamesPlayed">0</span></p>
        <p>总游戏时间: <span id="totalTime">0</span>s</p>
    </div>

    <div class="game-container">
        <div class="game-header">
            <h1>🐍 终极贪吃蛇</h1>
        </div>
        
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">等级</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">长度</div>
                <div class="info-value" id="length">3</div>
            </div>
            <div class="info-item">
                <div class="info-label">速度</div>
                <div class="info-value" id="speed">150</div>
            </div>
        </div>
        
        <div class="game-board">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="gameOverlay" class="game-overlay">
                <div class="overlay-content">
                    <h2 id="overlayTitle">游戏准备开始</h2>
                    <p id="overlayMessage">点击开始游戏按钮开始</p>
                    <div id="overlayStats"></div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="startGame()">▶️ 开始游戏</button>
            <button class="btn btn-secondary" onclick="pauseGame()">⏸️ 暂停</button>
            <button class="btn btn-danger" onclick="restartGame()">🔄 重新开始</button>
            <button class="btn btn-secondary" onclick="toggleTheme()">🌙 切换主题</button>
        </div>
        
        <div class="mobile-controls">
            <h3>📱 移动设备控制</h3>
            <div class="d-pad">
                <button class="d-pad-btn up" onclick="changeDirection('up')">⬆️</button>
                <button class="d-pad-btn left" onclick="changeDirection('left')">⬅️</button>
                <button class="d-pad-btn right" onclick="changeDirection('right')">➡️</button>
                <button class="d-pad-btn down" onclick="changeDirection('down')">⬇️</button>
            </div>
        </div>
        
        <div class="instructions">
            <h3>🎯 游戏说明</h3>
            <p>• 使用方向键或屏幕按钮控制蛇的移动</p>
            <p>• 吃掉红色食物增加长度和得分</p>
            <p>• 每得50分升一级，速度会加快</p>
            <p>• 避免撞墙或自己的身体</p>
            <p>• 挑战更高分数，解锁成就！</p>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const lengthElement = document.getElementById('length');
        const speedElement = document.getElementById('speed');
        const gameOverlay = document.getElementById('gameOverlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayMessage = document.getElementById('overlayMessage');
        const overlayStats = document.getElementById('overlayStats');
        
        // 游戏配置
        const gridSize = 20;
        const gridWidth = canvas.width / gridSize;
        const gridHeight = canvas.height / gridSize;
        
        // 游戏状态
        let gameState = {
            snake: [],
            food: {},
            direction: 'right',
            nextDirection: 'right',
            score: 0,
            level: 1,
            speed: 150,
            gameRunning: false,
            gameStarted: false,
            gameOver: false,
            paused: false,
            startTime: null,
            totalGameTime: 0,
            highScore: parseInt(localStorage.getItem('snakeHighScore')) || 0,
            gamesPlayed: parseInt(localStorage.getItem('snakeGamesPlayed')) || 0,
            totalTimePlayed: parseInt(localStorage.getItem('snakeTotalTime')) || 0
        };
        
        let gameLoop;
        let particles = [];
        let achievements = [
            { score: 100, title: "新手上路", desc: "得分达到100分！" },
            { score: 250, title: "蛇形专家", desc: "得分达到250分！" },
            { score: 500, title: "贪吃大师", desc: "得分达到500分！" },
            { score: 1000, title: "传说蛇王", desc: "得分达到1000分！" }
        ];
        let unlockedAchievements = JSON.parse(localStorage.getItem('snakeAchievements')) || [];
        
        // 主题配置
        let currentTheme = localStorage.getItem('snakeTheme') || 'classic';
        const themes = {
            classic: {
                bg: '#000',
                snake: '#4CAF50',
                snakeHead: '#2E7D32',
                food: '#FF5722',
                grid: '#333'
            },
            neon: {
                bg: '#0a0a0a',
                snake: '#00ffff',
                snakeHead: '#ff00ff',
                food: '#ffff00',
                grid: '#1a1a1a'
            },
            nature: {
                bg: '#1b5e20',
                snake: '#8bc34a',
                snakeHead: '#4caf50',
                food: '#ff9800',
                grid: '#2e7d32'
            }
        };
        
        function initGame() {
            gameState.snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            
            generateFood();
            gameState.direction = 'right';
            gameState.nextDirection = 'right';
            gameState.score = 0;
            gameState.level = 1;
            gameState.speed = 150;
            gameState.gameRunning = false;
            gameState.gameStarted = false;
            gameState.gameOver = false;
            gameState.paused = false;
            gameState.startTime = null;
            
            updateDisplay();
            hideOverlay();
        }
        
        function generateFood() {
            const emptyCells = [];
            for (let x = 0; x < gridWidth; x++) {
                for (let y = 0; y < gridHeight; y++) {
                    if (!gameState.snake.some(segment => segment.x === x && segment.y === y)) {
                        emptyCells.push({x, y});
                    }
                }
            }
            
            if (emptyCells.length > 0) {
                const randomIndex = Math.floor(Math.random() * emptyCells.length);
                gameState.food = emptyCells[randomIndex];
                createFoodParticles();
            }
        }
        
        function createFoodParticles() {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: gameState.food.x * gridSize + gridSize / 2,
                    y: gameState.food.y * gridSize + gridSize / 2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1,
                    decay: 0.02
                });
            }
        }
        
        function draw() {
            const theme = themes[currentTheme];
            
            // 清空画布
            ctx.fillStyle = theme.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = theme.grid;
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // 绘制蛇
            gameState.snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = theme.snakeHead;
                } else {
                    ctx.fillStyle = theme.snake;
                }
                
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                
                // 蛇头特效
                if (index === 0) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                }
            });
            
            // 绘制食物
            ctx.fillStyle = theme.food;
            ctx.fillRect(gameState.food.x * gridSize, gameState.food.y * gridSize, gridSize, gridSize);
            
            // 食物发光效果
            ctx.shadowColor = theme.food;
            ctx.shadowBlur = 15;
            ctx.fillRect(gameState.food.x * gridSize, gameState.food.y * gridSize, gridSize, gridSize);
            ctx.shadowBlur = 0;
            
            // 绘制粒子效果
            particles.forEach((particle, index) => {
                ctx.fillStyle = `rgba(76, 175, 80, ${particle.life})`;
                ctx.fillRect(particle.x, particle.y, 3, 3);
                
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life -= particle.decay;
                
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }
        
        function update() {
            if (!gameState.gameRunning || gameState.paused) return;
            
            gameState.direction = gameState.nextDirection;
            
            const head = {...gameState.snake[0]};
            
            switch (gameState.direction) {
                case 'up':
                    head.y--;
                    break;
                case 'down':
                    head.y++;
                    break;
                case 'left':
                    head.x--;
                    break;
                case 'right':
                    head.x++;
                    break;
            }
            
            // 检查边界碰撞
            if (head.x < 0 || head.x >= gridWidth || head.y < 0 || head.y >= gridHeight) {
                gameOver();
                return;
            }
            
            // 检查自身碰撞
            if (gameState.snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            gameState.snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === gameState.food.x && head.y === gameState.food.y) {
                gameState.score += 10;
                
                // 每得50分升一级
                if (gameState.score % 50 === 0 && gameState.level < 10) {
                    gameState.level++;
                    gameState.speed = Math.max(50, gameState.speed - 15);
                    showAchievement(`等级 ${gameState.level} 解锁！`);
                }
                
                generateFood();
                updateDisplay();
                
                // 检查成就
                checkAchievements();
            } else {
                gameState.snake.pop();
            }
        }
        
        function gameLoopFunction() {
            if (gameState.gameRunning) {
                update();
                draw();
                setTimeout(() => {
                    gameLoopFunction();
                }, gameState.speed);
            }
        }
        
        function startGame() {
            if (!gameState.gameStarted) {
                gameState.gameStarted = true;
                gameState.startTime = Date.now();
                hideOverlay();
            }
            
            if (!gameState.gameRunning) {
                gameState.gameRunning = true;
                gameState.paused = false;
                gameLoopFunction();
            }
        }
        
        function pauseGame() {
            if (gameState.gameRunning) {
                gameState.paused = !gameState.paused;
                if (gameState.paused) {
                    showOverlay('游戏暂停', '点击开始游戏继续');
                } else {
                    hideOverlay();
                }
            }
        }
        
        function restartGame() {
            if (gameState.gameRunning) {
                gameState.gameRunning = false;
            }
            
            if (gameState.startTime) {
                gameState.totalGameTime = Date.now() - gameState.startTime;
                gameState.totalTimePlayed += Math.floor(gameState.totalGameTime / 1000);
                localStorage.setItem('snakeTotalTime', gameState.totalTimePlayed);
            }
            
            gameState.gamesPlayed++;
            localStorage.setItem('snakeGamesPlayed', gameState.gamesPlayed);
            
            initGame();
            draw();
            showOverlay('准备开始', '点击开始游戏按钮开始新游戏');
        }
        
        function gameOver() {
            gameState.gameRunning = false;
            gameState.gameOver = true;
            
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('snakeHighScore', gameState.highScore);
                showAchievement('🎉 新纪录！');
            }
            
            const finalStats = `
                <p>最终得分: <strong>${gameState.score}</strong></p>
                <p>达到等级: <strong>${gameState.level}</strong></p>
                <p>蛇的长度: <strong>${gameState.snake.length}</strong></p>
                <p>最高得分: <strong>${gameState.highScore}</strong></p>
            `;
            
            showOverlay('游戏结束！', '不错的表现！', finalStats);
        }
        
        function showOverlay(title, message, stats = '') {
            overlayTitle.textContent = title;
            overlayMessage.textContent = message;
            overlayStats.innerHTML = stats;
            gameOverlay.classList.add('active');
        }
        
        function hideOverlay() {
            gameOverlay.classList.remove('active');
        }
        
        function updateDisplay() {
            scoreElement.textContent = gameState.score;
            levelElement.textContent = gameState.level;
            lengthElement.textContent = gameState.snake.length;
            speedElement.textContent = gameState.speed;
            
            document.getElementById('highScore').textContent = gameState.highScore;
            document.getElementById('gamesPlayed').textContent = gameState.gamesPlayed;
            document.getElementById('totalTime').textContent = gameState.totalTimePlayed;
        }
        
        function checkAchievements() {
            achievements.forEach(achievement => {
                if (gameState.score >= achievement.score && 
                    !unlockedAchievements.includes(achievement.score)) {
                    unlockedAchievements.push(achievement.score);
                    localStorage.setItem('snakeAchievements', JSON.stringify(unlockedAchievements));
                    showAchievement(`🏆 ${achievement.title}\n${achievement.desc}`);
                }
            });
        }
        
        function showAchievement(text) {
            const achievement = document.createElement('div');
            achievement.className = 'achievement';
            achievement.textContent = text;
            document.body.appendChild(achievement);
            
            setTimeout(() => {
                document.body.removeChild(achievement);
            }, 2000);
        }
        
        function toggleTheme() {
            const themeKeys = Object.keys(themes);
            const currentIndex = themeKeys.indexOf(currentTheme);
            const nextIndex = (currentIndex + 1) % themeKeys.length;
            currentTheme = themeKeys[nextIndex];
            localStorage.setItem('snakeTheme', currentTheme);
            
            const themeNames = {
                classic: '经典',
                neon: '霓虹',
                nature: '自然'
            };
            
            showAchievement(`主题已切换为: ${themeNames[currentTheme]}`);
            draw();
        }
        
        function changeDirection(newDirection) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[gameState.direction] !== newDirection) {
                gameState.nextDirection = newDirection;
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameState.gameRunning) return;
            
            switch (e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    changeDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    pauseGame();
                    break;
            }
        });
        
        // 触摸控制
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });
        
        canvas.addEventListener('touchend', (e) => {
            if (!gameState.gameRunning) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 30) {
                    changeDirection('right');
                } else if (deltaX < -30) {
                    changeDirection('left');
                }
            } else {
                if (deltaY > 30) {
                    changeDirection('down');
                } else if (deltaY < -30) {
                    changeDirection('up');
                }
            }
            
            e.preventDefault();
        }, { passive: false });
        
        // 初始化游戏
        function init() {
            initGame();
            draw();
            showOverlay('🐍 终极贪吃蛇', '点击开始游戏按钮开始冒险！');
            updateDisplay();
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
